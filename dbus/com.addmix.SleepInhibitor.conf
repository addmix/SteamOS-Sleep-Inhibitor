<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
 "https://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">

<busconfig>

    <!-- Allow the root helper to own its service name -->
    <policy user="root">
        <allow own="com.addmix.SleepInhibitor"/>
        <allow send_destination="com.addmix.SleepInhibitor"/>
    </policy>

    <!-- Allow user applications to talk to the helper -->
    <policy context="default">
        <allow send_destination="com.addmix.SleepInhibitor"/>
    </policy>

</busconfig>
